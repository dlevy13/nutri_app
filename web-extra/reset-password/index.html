<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Réinitialiser le mot de passe</title>

  <!-- Supabase JS v2 CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: system-ui, Arial;
      max-width: 420px;
      margin: 40px auto;
      padding: 0 16px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
    }
    #msg {
      margin-top: 12px;
      min-height: 20px;
    }
  </style>
</head>

<body>

<h2>Nouveau mot de passe</h2>
<h3>Minimum 8 caractères</h3>
<input id="password" type="password" placeholder="Nouveau mot de passe" />
<input id="confirm" type="password" placeholder="Confirmer le mot de passe" />

<button id="btn">Valider</button>
<p id="msg"></p>

<script>
  // --------------------------------------------------
  // 🔐 CONFIG SUPABASE
  // --------------------------------------------------
  const SUPABASE_URL = "https://jasofcbxjgnuydohlyzk.supabase.co";
  const SUPABASE_ANON_KEY =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imphc29mY2J4amdudXlkb2hseXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4MzMzNTAsImV4cCI6MjA4MjQwOTM1MH0.2_EJl6zbR-aY2ofpPIWqEylZYFcKDWX8lmGjpePzj9A";

  // ⚠️ ne jamais appeler la variable "supabase"
  const supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");

  // --------------------------------------------------
  // 1️⃣ INIT : créer la session depuis le lien email
  // --------------------------------------------------
  async function initRecoverySession() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);

    const accessToken = params.get("access_token");
    const refreshToken = params.get("refresh_token");
    const type = params.get("type");

    if (type !== "recovery" || !accessToken || !refreshToken) {
      msg.textContent = "Lien invalide ou expiré.";
      btn.disabled = true;
      return;
    }

    const { error } = await supabaseClient.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    });

    if (error) {
      console.error(error);
      msg.textContent = "Lien invalide ou expiré.";
      btn.disabled = true;
    }
  }

  // 🔥 exécuté immédiatement au chargement
  initRecoverySession();

  // --------------------------------------------------
  // 2️⃣ ACTION : changement de mot de passe
  // --------------------------------------------------
  btn.addEventListener("click", resetPassword);

  async function resetPassword() {
    try {
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirm").value.trim();

      if (password.length < 8) {
        msg.textContent = "Minimum 8 caractères.";
        return;
      }

      if (password !== confirmPassword) {
        msg.textContent = "Les mots de passe ne correspondent pas.";
        return;
      }

      msg.textContent = "Traitement en cours…";
      btn.disabled = true;

      // ✅ vérifier que la session existe
      const { data: { session } } =
        await supabaseClient.auth.getSession();

      if (!session) {
        msg.textContent = "Lien invalide ou expiré.";
        btn.disabled = false;
        return;
      }

      // ✅ mise à jour du mot de passe
      const { error } = await supabaseClient.auth.updateUser({
        password,
      });

      if (error) {
        msg.textContent = error.message;
        btn.disabled = false;
        return;
      }

      msg.textContent = "Mot de passe modifié ✅ Redirection…";

      // (optionnel mais propre)
      await supabaseClient.auth.signOut();

      setTimeout(() => {
        window.location.href = "https://nutriapp-4ea20.web.app";
      }, 1500);

    } catch (err) {
      console.error(err);
      msg.textContent = "Erreur inattendue. Vérifie la console.";
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
